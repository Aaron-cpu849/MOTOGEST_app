<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoGest</title>
<style>
:root{
  --bg:#f4f3ef;--bg1:#ffffff;--bg2:#f0efe9;--bg3:#e8e7e0;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#999891;
  --info-bg:#e6f1fb;--info-text:#185fa5;--info-border:rgba(24,95,165,.35);
  --success-bg:#eaf3de;--success-text:#3b6d11;--success-border:rgba(59,109,17,.35);
  --warn-bg:#faeeda;--warn-text:#854f0b;--warn-border:rgba(133,79,11,.35);
  --danger-bg:#fcebeb;--danger-text:#a32d2d;--danger-border:rgba(163,45,45,.35);
  --border:rgba(0,0,0,.11);--border2:rgba(0,0,0,.2);
  --r:8px;--rl:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#181816;--bg1:#222220;--bg2:#2a2a27;--bg3:#1e1e1b;
  --text:#f0efe8;--text2:#aaa99f;--text3:#66655f;
  --info-bg:rgba(24,95,165,.15);--info-text:#85b7eb;
  --success-bg:rgba(59,109,17,.15);--success-text:#97c459;
  --warn-bg:rgba(133,79,11,.15);--warn-text:#ef9f27;
  --danger-bg:rgba(163,45,45,.15);--danger-text:#f09595;
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.18);
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
input,button,select,textarea{font-family:var(--font);color:var(--text)}
input,select{background:var(--bg1);border:.5px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;outline:none;transition:border .15s}
input:focus,select:focus{border-color:var(--info-border);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
button{cursor:pointer;border:none;background:none}
a{color:var(--info-text)}

/* Layout */
.shell{max-width:960px;margin:0 auto;padding:0 1rem 3rem}
.topnav{background:var(--bg1);border-bottom:.5px solid var(--border);position:sticky;top:0;z-index:50}
.topnav-inner{max-width:960px;margin:0 auto;padding:0 1rem;display:flex;align-items:center;gap:0}
.nav-logo{display:flex;align-items:center;gap:8px;padding:.875rem 1rem .875rem 0;border-right:.5px solid var(--border);margin-right:.5rem}
.nav-logo svg{width:22px;height:22px}
.nav-logo span{font-size:15px;font-weight:600;letter-spacing:-.01em}
.nav-btn{padding:.875rem .875rem;font-size:13px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.nav-btn.active{color:var(--text);border-bottom-color:var(--text)}
.nav-btn .nbadge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;font-size:10px;font-weight:600;padding:0 4px;margin-left:4px;background:var(--danger-bg);color:var(--danger-text)}
.nav-btn .nbadge.ok{background:var(--success-bg);color:var(--success-text)}
.page{padding-top:1.25rem}

/* Stats row */
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:var(--bg2);border-radius:var(--r);padding:.75rem 1rem}
.stat-lbl{font-size:12px;color:var(--text2);margin-bottom:3px}
.stat-val{font-size:20px;font-weight:600}
.stat-val.g{color:var(--success-text)}.stat-val.a{color:var(--warn-text)}.stat-val.r{color:var(--danger-text)}.stat-val.b{color:var(--info-text)}

/* Cards */
.card{background:var(--bg1);border:.5px solid var(--border);border-radius:var(--rl);margin-bottom:.75rem;overflow:hidden}
.card-hdr{display:flex;align-items:center;gap:8px;padding:.75rem 1rem;cursor:pointer;user-select:none}
.card-body{border-top:.5px solid var(--border)}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;flex-shrink:0}
.badge-cur{background:var(--success-bg);color:var(--success-text)}
.badge-prev{background:var(--bg2);color:var(--text2)}
.badge-warn{background:var(--warn-bg);color:var(--warn-text)}
.badge-danger{background:var(--danger-bg);color:var(--danger-text)}
.badge-info{background:var(--info-bg);color:var(--info-text)}

/* Topbar */
.topbar{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;padding-left:30px}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3);pointer-events:none}
.filter-btns{display:flex;gap:4px;flex-shrink:0}
.fbtn{font-size:12px;font-weight:500;padding:5px 12px;border-radius:var(--r);border:.5px solid var(--border2);background:transparent;color:var(--text2)}
.fbtn.active{border-color:var(--info-border);background:var(--info-bg);color:var(--info-text)}
.fbtn.active.g{border-color:var(--success-border);background:var(--success-bg);color:var(--success-text)}
.fbtn.active.r{border-color:var(--danger-border);background:var(--danger-bg);color:var(--danger-text)}

/* Alert */
.alert{display:flex;align-items:center;gap:8px;padding:.6rem 1rem;background:var(--warn-bg);border:.5px solid var(--warn-border);border-radius:var(--r);margin-bottom:.875rem;font-size:13px;color:var(--warn-text)}

/* Week header */
.week-range{font-size:14px;font-weight:600;color:var(--text);flex:1}
.week-meta{font-size:12px;color:var(--text2)}
.week-total{font-size:14px;font-weight:600}
.chevron{font-size:11px;color:var(--text3);transition:transform .18s;flex-shrink:0}
.chevron.open{transform:rotate(90deg)}
.btn-csv{font-size:11px;padding:3px 9px;border-radius:4px;border:.5px solid var(--border2);background:transparent;color:var(--text2);flex-shrink:0}
.btn-csv:hover{background:var(--bg2)}

/* Day group */
.day-grp{border-bottom:.5px solid var(--border)}
.day-grp:last-child{border-bottom:none}
.day-hdr{display:flex;align-items:center;gap:8px;padding:.4rem 1rem;background:var(--bg2)}
.day-lbl{font-size:12px;font-weight:500;color:var(--text2);min-width:90px}
.day-tot{font-size:12px;color:var(--text3)}

/* Payment row */
.pay-row{display:flex;align-items:center;gap:10px;padding:.55rem 1rem;border-bottom:.5px solid var(--border);transition:background .1s}
.pay-row:last-child{border-bottom:none}
.pay-row:hover{background:var(--bg2)}
.pay-row.dup{background:rgba(133,79,11,.05)}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.av-info{background:var(--info-bg);color:var(--info-text)}
.av-success{background:var(--success-bg);color:var(--success-text)}
.av-danger{background:var(--danger-bg);color:var(--danger-text)}
.pay-info{flex:1;min-width:0}
.pay-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pay-meta{font-size:11px;color:var(--text2);display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:1px;font-family:monospace}
.tag{font-size:10px;padding:1px 5px;border-radius:3px;font-family:var(--font)}
.tag-warn{background:var(--warn-bg);color:var(--warn-text)}
.tag-op{background:var(--bg2);color:var(--text2)}
.pay-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pay-val{font-size:14px;font-weight:600;color:var(--success-text)}
.btn-edit{font-size:11px;padding:3px 8px;border-radius:4px;border:.5px solid var(--border2);background:transparent;color:var(--text2)}
.btn-edit:hover{background:var(--bg2);color:var(--text)}

/* Adimplência */
.inad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px;margin-top:.5rem}
.inad-card{background:var(--bg1);border:.5px solid var(--border);border-radius:var(--r);padding:.7rem;display:flex;align-items:center;gap:10px}
.inad-card.ok{border-color:var(--success-border)}
.inad-card .iname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inad-card .idet{font-size:11px;color:var(--text2);font-family:monospace}
.inad-val{font-size:13px;font-weight:600;margin-left:auto;flex-shrink:0}
.inad-val.r{color:var(--danger-text)}.inad-val.g{color:var(--success-text)}
.sec-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin:1.25rem 0 .5rem}

/* Motos */
.moto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.moto-card{background:var(--bg1);border:.5px solid var(--border);border-radius:var(--rl);padding:1rem;position:relative}
.moto-card.unavail{opacity:.6}
.moto-placa{font-size:15px;font-weight:700;letter-spacing:.03em;font-family:monospace}
.moto-nome{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.moto-row{display:flex;justify-content:space-between;font-size:12px;margin-top:8px;padding-top:8px;border-top:.5px solid var(--border)}
.moto-km{font-size:13px;font-weight:500;font-family:monospace}
.moto-label{font-size:11px;color:var(--text2)}
.moto-badge{position:absolute;top:.75rem;right:.75rem;font-size:10px;padding:2px 7px;border-radius:4px}
.alert-oil{background:var(--warn-bg);color:var(--warn-text)}
.alert-rev{background:var(--danger-bg);color:var(--danger-text)}
.status-disp{background:var(--success-bg);color:var(--success-text)}
.progress-wrap{margin-top:8px}
.progress-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:3px}
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.fill-ok{background:var(--success-text)}.fill-warn{background:var(--warn-text)}.fill-danger{background:var(--danger-text)}

/* Multas */
.multa-row{display:flex;align-items:flex-start;gap:12px;padding:.75rem 1rem;border-bottom:.5px solid var(--border)}
.multa-row:last-child{border-bottom:none}
.multa-auto{font-size:11px;font-weight:600;color:var(--text2);font-family:monospace}
.multa-loc{font-size:12px;color:var(--text2);margin-top:2px;max-width:400px}
.multa-val{font-size:14px;font-weight:600;color:var(--danger-text);flex-shrink:0;margin-left:auto}
.multa-st{font-size:11px;padding:2px 7px;border-radius:4px;flex-shrink:0}
.st-p{background:var(--danger-bg);color:var(--danger-text)}
.st-q{background:var(--warn-bg);color:var(--warn-text)}
.st-ok{background:var(--success-bg);color:var(--success-text)}

/* Estoque */
.est-row{display:flex;align-items:center;gap:12px;padding:.7rem 1rem;border-bottom:.5px solid var(--border)}
.est-row:last-child{border-bottom:none}
.est-nome{font-size:13px;font-weight:500;flex:1}
.est-det{font-size:12px;color:var(--text2)}
.est-qtd{font-size:16px;font-weight:600;min-width:40px;text-align:right}
.est-min{font-size:11px;color:var(--text3)}

/* Manutenção */
.mhist-row{display:flex;align-items:center;gap:10px;padding:.6rem 1rem;border-bottom:.5px solid var(--border)}
.mhist-row:last-child{border-bottom:none}
.tipo-ico{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.tipo-oil{background:var(--warn-bg);color:var(--warn-text)}
.tipo-rev{background:var(--info-bg);color:var(--info-text)}
.tipo-pneu{background:var(--success-bg);color:var(--success-text)}
.mhist-info{flex:1;min-width:0}
.mhist-placa{font-size:12px;font-weight:600;font-family:monospace}
.mhist-nome{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mhist-km{font-size:13px;font-weight:500;font-family:monospace;flex-shrink:0}
.mhist-data{font-size:11px;color:var(--text3);flex-shrink:0}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding-top:60px}
.modal{background:var(--bg1);border:.5px solid var(--border2);border-radius:var(--rl);padding:1.25rem;width:400px;max-width:94vw;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-ttl{font-size:16px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:1rem;padding-bottom:.875rem;border-bottom:.5px solid var(--border)}
.modal-lbl{font-size:12px;color:var(--text2);margin-bottom:4px}
.modal-row{margin-bottom:.875rem}
.loc-list{border:.5px solid var(--border);border-radius:var(--r);max-height:220px;overflow-y:auto;margin-top:6px}
.loc-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:.5px solid var(--border);cursor:pointer}
.loc-item:last-child{border-bottom:none}
.loc-item:hover{background:var(--bg2)}
.loc-item.sel{background:var(--info-bg)}
.loc-nome{font-size:13px;font-weight:500}
.loc-det{font-size:11px;color:var(--text2);font-family:monospace}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn-cancel{padding:6px 16px;border-radius:var(--r);border:.5px solid var(--border2);background:transparent;color:var(--text2);font-size:13px}
.btn-save{padding:6px 16px;border-radius:var(--r);border:.5px solid var(--info-border);background:var(--info-bg);color:var(--info-text);font-size:13px;font-weight:500}
.btn-save:disabled{opacity:.4;cursor:default}

.empty{padding:2rem;text-align:center;color:var(--text2);font-size:13px}
</style>
</head>

function setTab(t) {
  activeTab = t;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.style.display='none');
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('page-'+t).style.display='block';
  render();
}

function render() {
  if (activeTab==='frota') renderFrota();
  if (activeTab==='pag') renderPag();
  if (activeTab==='inad') renderInad();
  if (activeTab==='multas') renderMultas();
  if (activeTab==='est') renderEst();
  if (activeTab==='manut') renderManut();
  updateBadges();
}

function updateBadges() {
  const paid = new Set(payments.filter(p=>p.sem===CURR_SUN).map(p=>p.mId));
  const locAtivos = motos.filter(m=>m.nome && m.nome.trim() && m.on);
  const inadCount = locAtivos.filter(m=>!paid.has(m.id)).length;
  const multasPend = multas.filter(m=>m.st==='p').length;
  const bi = document.getElementById('badge-inad');
  const bm = document.getElementById('badge-multas');
  if(bi){ bi.textContent = inadCount; bi.className = 'nbadge'+(inadCount===0?' ok':''); }
  if(bm){ bm.textContent = multasPend; bm.className = 'nbadge'+(multasPend===0?' ok':''); }
}

// ─── FROTA ──────────────────────────────────────────────────────────────────
function renderFrota() {
  const el = document.getElementById('page-frota');
  const total = motos.length;
  const locadas = motos.filter(m=>m.nome&&m.nome.trim()).length;
  const disponiveis = motos.filter(m=>!m.nome||!m.nome.trim()).length;

  const alertOil = m => m.loilKm && m.odo && (m.odo - m.loilKm) >= 1000;
  const alertRev = m => m.lrevKm && m.odo && (m.odo - m.lrevKm) >= 1000;

  const filtered = motos.filter(m => {
    if(motoFilter==='locada') return m.nome&&m.nome.trim();
    if(motoFilter==='disponivel') return !m.nome||!m.nome.trim();
    if(motoFilter==='oil') return alertOil(m);
    if(motoFilter==='rev') return alertRev(m);
    return true;
  });

  let html = `
  <div class="stats">
    <div class="stat"><div class="stat-lbl">Total motos</div><div class="stat-val b">${total}</div></div>
    <div class="stat"><div class="stat-lbl">Locadas</div><div class="stat-val g">${locadas}</div></div>
    <div class="stat"><div class="stat-lbl">Disponíveis</div><div class="stat-val">${disponiveis}</div></div>
    <div class="stat"><div class="stat-lbl">Alertas manutenção</div><div class="stat-val r">${motos.filter(m=>alertOil(m)||alertRev(m)).length}</div></div>
  </div>
  <div class="topbar">
    <div class="filter-btns">
      <button class="fbtn ${motoFilter==='todos'?'active':''}" onclick="setMotoFilter('todos')">Todas (${total})</button>
      <button class="fbtn ${motoFilter==='locada'?'active g':''}" onclick="setMotoFilter('locada')">Locadas (${locadas})</button>
      <button class="fbtn ${motoFilter==='disponivel'?'active':''}" onclick="setMotoFilter('disponivel')">Disponíveis (${disponiveis})</button>
      <button class="fbtn ${motoFilter==='oil'?'active':''}" onclick="setMotoFilter('oil')">⚠ Óleo</button>
      <button class="fbtn ${motoFilter==='rev'?'active':''}" onclick="setMotoFilter('rev')">⚠ Revisão</button>
    </div>
  </div>
  <div class="moto-grid">`;

  filtered.forEach(m => {
    const locada = m.nome && m.nome.trim();
    const oil = alertOil(m);
    const rev = alertRev(m);
    const diffOil = m.loilKm && m.odo ? m.odo - m.loilKm : 0;
    const pctOil = m.loilKm && m.odo ? Math.min(100, Math.round((diffOil / 1000)*100)) : 0;
    const fillClass = pctOil >= 100 ? 'fill-danger' : pctOil >= 70 ? 'fill-warn' : 'fill-ok';

    let badge = '';
    if (!locada) badge = `<span class="moto-badge status-disp">Disponível</span>`;
    else if (rev) badge = `<span class="moto-badge alert-rev">Rev. pendente</span>`;
    else if (oil) badge = `<span class="moto-badge alert-oil">Trocar óleo</span>`;

    html += `
    <div class="moto-card ${!locada?'unavail':''}">
      ${badge}
      <div class="moto-placa">${m.placa}</div>
      <div class="moto-nome">${locada ? m.nome : '— Disponível —'}</div>
      <div class="moto-row">
        <div><div class="moto-label">Odômetro</div><div class="moto-km">${m.odo ? m.odo.toLocaleString('pt-BR')+' km' : '—'}</div></div>
        <div style="text-align:right"><div class="moto-label">Dia pgto</div><div class="moto-km">${m.dia||'—'}</div></div>
        <div style="text-align:right"><div class="moto-label">Valor</div><div class="moto-km ${m.val?'':''}">R$ ${fmtR(m.val||0)}</div></div>
      </div>
      ${m.loilKm&&m.odo?`
      <div class="progress-wrap">
        <div class="progress-lbl"><span>Óleo</span><span>${diffOil.toLocaleString('pt-BR')} / 1000 km</span></div>
        <div class="progress-bar"><div class="progress-fill ${fillClass}" style="width:${pctOil}%"></div></div>
      </div>`:''}
    </div>`;
  });

  html += `</div>`;
  el.innerHTML = html;
}
function setMotoFilter(f){ motoFilter=f; renderFrota(); }

// ─── PAGAMENTOS ──────────────────────────────────────────────────────────────
function groupBySem() {
  const map = {};
  payments.forEach(p => {
    if(!map[p.sem]) map[p.sem]={sem:p.sem, pgs:[], wasFixed: p.semOrig!==normSunday(p.semOrig)};
    map[p.sem].pgs.push(p);
  });
  return Object.values(map).sort((a,b)=>b.sem.localeCompare(a.sem));
}
function dupMap(pgs) {
  const m={};
  pgs.forEach(p=>{ m[p.mId]=(m[p.mId]||0)+1; });
  return m;
}
function applySearch(pgs) {
  if(!pagSearch) return pgs;
  const q=pagSearch.toLowerCase();
  return pgs.filter(p=>{
    const l=locMap[p.mId]||{};
    return (l.nome&&l.nome.toLowerCase().includes(q))||(l.placa&&l.placa.toLowerCase().includes(q))||(p.operador&&p.operador.toLowerCase().includes(q))||(p.obs&&p.obs.toLowerCase().includes(q));
  });
}
function exportCSV(sem) {
  const w = groupBySem().find(x=>x.sem===sem);
  if(!w) return;
  const lines=[['Data','Locatário','Placa','Valor','Observação','Operador']];
  w.pgs.forEach(p=>{
    const l=locMap[p.mId]||{};
    lines.push([p.data,l.nome||'',l.placa||'',p.valor.toFixed(2),p.obs||'',p.operador||'']);
  });
  const csv=lines.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`pagamentos_${sem}.csv`; a.click();
  URL.revokeObjectURL(url);
}

function renderPag() {
  const el = document.getElementById('page-pag');
  const weeks = groupBySem();
  const curr = weeks.filter(w=>w.sem===CURR_SUN);
  const prev = weeks.filter(w=>w.sem!==CURR_SUN);
  const totalC = curr.reduce((s,w)=>s+w.pgs.reduce((ss,p)=>ss+p.valor,0),0);
  const countC = curr.reduce((s,w)=>s+w.pgs.length,0);
  const totalP = prev.reduce((s,w)=>s+w.pgs.reduce((ss,p)=>ss+p.valor,0),0);
  const hadFix = payments.some(p=>p.semOrig!==normSunday(p.semOrig));

  let html = `
  <div class="stats">
    <div class="stat"><div class="stat-lbl">Total geral</div><div class="stat-val">R$ ${fmtR(totalC+totalP)}</div></div>
    <div class="stat"><div class="stat-lbl">Semana atual</div><div class="stat-val g">R$ ${fmtR(totalC)}</div></div>
    <div class="stat"><div class="stat-lbl">Semanas anteriores</div><div class="stat-val a">R$ ${fmtR(totalP)}</div></div>
    <div class="stat"><div class="stat-lbl">Pgtos esta semana</div><div class="stat-val b">${countC}</div></div>
  </div>
  <div class="topbar">
    <div class="search-wrap">
      <svg class="search-ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
      <input placeholder="Buscar nome, placa, operador…" value="${pagSearch.replace(/"/g,'&quot;')}" oninput="pagSearch=this.value;renderPag()">
    </div>
  </div>`;

  if(hadFix) html+=`<div class="alert">⚠ Semanas com data incorreta foram normalizadas automaticamente para o domingo da semana.</div>`;

  if(curr.length===0) html+=`<div class="empty">Nenhum pagamento na semana atual (${fmtRange(CURR_SUN)})</div>`;
  curr.forEach(w=>{ html+=renderWeekBlock(w,true); });

  if(prev.length>0){
    html+=`<div class="sec-title">Semanas anteriores</div>`;
    prev.forEach(w=>{ html+=renderWeekBlock(w,false); });
  }
  el.innerHTML = html;
}

function renderWeekBlock(w, isCurr) {
  const key = w.sem;
  const isOpen = key in expandedWeeks ? expandedWeeks[key] : isCurr;
  const dups = dupMap(w.pgs);
  const dupCount = Object.values(dups).filter(v=>v>1).length;
  const filtered = applySearch(w.pgs);
  const total = w.pgs.reduce((s,p)=>s+p.valor,0);

  let badges = '';
  if(isCurr) badges+=`<span class="badge badge-cur">Semana atual</span>`;
  else badges+=`<span class="badge badge-prev">Encerrada</span>`;
  if(w.wasFixed) badges+=`<span class="badge badge-warn" title="Data corrigida para domingo">Corrigida</span>`;
  if(dupCount>0) badges+=`<span class="badge badge-warn">${dupCount} duplicata${dupCount>1?'s':''}</span>`;

  let html = `<div class="card">
  <div class="card-hdr" onclick="toggleWeek('${key}')">
    ${badges}
    <span class="week-range">${fmtRange(w.sem)}</span>
    <span class="week-meta">${w.pgs.length} pgtos</span>
    <span class="week-total">R$ ${fmtR(total)}</span>
    <button class="btn-csv" onclick="event.stopPropagation();exportCSV('${key}')">↓ CSV</button>
    <span class="chevron ${isOpen?'open':''}">&#9654;</span>
  </div>`;

  if(isOpen) {
    html+=`<div class="card-body">`;
    if(filtered.length===0){ html+=`<div class="empty">Nenhum resultado para a busca</div>`; }
    else {
      const byDate={};
      filtered.forEach(p=>{if(!byDate[p.data])byDate[p.data]=[];byDate[p.data].push(p);});
      Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date,pgs])=>{
        const dt=pgs.reduce((s,p)=>s+p.valor,0);
        html+=`<div class="day-grp"><div class="day-hdr"><span class="day-lbl">${fmtD(date)}</span><span class="day-tot">${pgs.length} pgtos · R$ ${fmtR(dt)}</span></div>`;
        pgs.forEach(p=>{
          const l=locMap[p.mId]||{};
          const isDup=dups[p.mId]>1;
          html+=`<div class="pay-row ${isDup?'dup':''}">
            <div class="avatar av-info">${initials(l.nome)}</div>
            <div class="pay-info">
              <div class="pay-name">${l.nome||'Desconhecido'}</div>
              <div class="pay-meta">
                <span>${l.placa||'?'}</span>
                ${p.operador?`<span class="tag tag-op">${p.operador}</span>`:''}
                ${isDup?`<span class="tag tag-warn">duplicado</span>`:''}
              </div>
            </div>
            <div class="pay-right">
              <span class="pay-val">R$ ${fmtR(p.valor)}</span>
              <button class="btn-edit" onclick="openEditModal('${p.id}')">Editar</button>
            </div>
          </div>`;
        });
        html+=`</div>`;
      });
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}
function toggleWeek(k){ expandedWeeks[k]=k in expandedWeeks?!expandedWeeks[k]:false; renderPag(); }

// ─── ADIMPLÊNCIA ─────────────────────────────────────────────────────────────
function renderInad() {
  const el = document.getElementById('page-inad');
  const currWeek = groupBySem().find(w=>w.sem===CURR_SUN);
  const paidIds = new Set((currWeek?.pgs||[]).map(p=>p.mId));
  const locAtivos = motos.filter(m=>m.nome&&m.nome.trim()&&m.on);
  const inadimplentes = locAtivos.filter(m=>!paidIds.has(m.id));
  const adimplentes = locAtivos.filter(m=>paidIds.has(m.id));
  const pct = locAtivos.length ? Math.round((adimplentes.length/locAtivos.length)*100) : 0;

  let html = `
  <div class="stats">
    <div class="stat"><div class="stat-lbl">Locatários ativos</div><div class="stat-val b">${locAtivos.length}</div></div>
    <div class="stat"><div class="stat-lbl">Em dia</div><div class="stat-val g">${adimplentes.length}</div></div>
    <div class="stat"><div class="stat-lbl">Pendentes</div><div class="stat-val r">${inadimplentes.length}</div></div>
    <div class="stat"><div class="stat-lbl">Adimplência</div><div class="stat-val ${pct>=80?'g':pct>=50?'a':'r'}">${pct}%</div></div>
  </div>
  <div style="font-size:13px;color:var(--text2);margin-bottom:.75rem;">Semana ${fmtRange(CURR_SUN)}</div>
  <div class="topbar">
    <div class="filter-btns">
      <button class="fbtn ${inadFilter==='pend'?'active r':''}" onclick="inadFilter='pend';renderInad()">Pendentes (${inadimplentes.length})</button>
      <button class="fbtn ${inadFilter==='ok'?'active g':''}" onclick="inadFilter='ok';renderInad()">Em dia (${adimplentes.length})</button>
      <button class="fbtn ${inadFilter==='todos'?'active':''}" onclick="inadFilter='todos';renderInad()">Todos</button>
    </div>
  </div>`;

  if(inadFilter==='pend'||inadFilter==='todos'){
    if(inadimplentes.length>0){
      html+=`<div class="sec-title">Pendentes</div><div class="inad-grid">`;
      inadimplentes.forEach(m=>{
        html+=`<div class="inad-card">
          <div class="avatar av-danger">${initials(m.nome)}</div>
          <div style="flex:1;min-width:0"><div class="iname">${m.nome}</div><div class="idet">${m.placa} · ${m.dia||'—'}</div></div>
          <div class="inad-val r">R$ ${fmtR(m.val||0)}</div>
        </div>`;
      });
      html+=`</div>`;
    }
  }
  if(inadFilter==='ok'||inadFilter==='todos'){
    if(adimplentes.length>0){
      html+=`<div class="sec-title">Em dia</div><div class="inad-grid">`;
      adimplentes.forEach(m=>{
        const pg = currWeek?.pgs.find(p=>p.mId===m.id);
        html+=`<div class="inad-card ok">
          <div class="avatar av-success">${initials(m.nome)}</div>
          <div style="flex:1;min-width:0"><div class="iname">${m.nome}</div><div class="idet">${m.placa} · ${pg?fmtD(pg.data):'—'}</div></div>
          <div class="inad-val g">R$ ${pg?fmtR(pg.valor):fmtR(m.val||0)}</div>
        </div>`;
      });
      html+=`</div>`;
    }
  }
  el.innerHTML = html;
}

// ─── MULTAS ──────────────────────────────────────────────────────────────────
function renderMultas() {
  const el = document.getElementById('page-multas');
  const pend = multas.filter(m=>m.st==='p');
  const quitadas = multas.filter(m=>m.st!=='p');
  const totalPend = pend.reduce((s,m)=>s+m.val,0);
  const totalGeral = multas.reduce((s,m)=>s+m.val,0);

  const filtered = multas.filter(m=>{
    if(multaFilter==='pend') return m.st==='p';
    if(multaFilter==='quit') return m.st!=='p';
    return true;
  }).sort((a,b)=>b.data.localeCompare(a.data));

  const stLabel = st => st==='p'?'Pendente':st==='q'?'Recorrendo':'Paga';
  const stClass = st => st==='p'?'st-p':st==='q'?'st-q':'st-ok';

  let html = `
  <div class="stats">
    <div class="stat"><div class="stat-lbl">Total multas</div><div class="stat-val">${multas.length}</div></div>
    <div class="stat"><div class="stat-lbl">Pendentes</div><div class="stat-val r">${pend.length}</div></div>
    <div class="stat"><div class="stat-lbl">Valor pendente</div><div class="stat-val r">R$ ${fmtR(totalPend)}</div></div>
    <div class="stat"><div class="stat-lbl">Total geral</div><div class="stat-val">R$ ${fmtR(totalGeral)}</div></div>
  </div>
  <div class="topbar">
    <div class="filter-btns">
      <button class="fbtn ${multaFilter==='todos'?'active':''}" onclick="multaFilter='todos';renderMultas()">Todas (${multas.length})</button>
      <button class="fbtn ${multaFilter==='pend'?'active r':''}" onclick="multaFilter='pend';renderMultas()">Pendentes (${pend.length})</button>
      <button class="fbtn ${multaFilter==='quit'?'active g':''}" onclick="multaFilter='quit';renderMultas()">Quitadas (${quitadas.length})</button>
    </div>
  </div>
  <div class="card"><div class="card-body">`;

  if(filtered.length===0){ html+=`<div class="empty">Nenhuma multa encontrada</div>`; }
  filtered.forEach(m=>{
    const moto = locMap[m.mId]||{};
    html+=`<div class="multa-row">
      <div class="avatar av-danger">${initials(moto.nome||moto.placa)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500">${moto.placa||m.mId} · ${moto.nome||''}</div>
        <div class="multa-auto">${m.auto||'—'} · ${fmtD(m.data)}</div>
        <div class="multa-loc">${m.loc||''}</div>
        ${m.prazo?`<div style="font-size:11px;color:var(--text3)">Prazo: ${fmtD(m.prazo)}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        <div class="multa-val">R$ ${fmtR(m.val)}</div>
        <span class="multa-st ${stClass(m.st)}">${stLabel(m.st)}</span>
      </div>
    </div>`;
  });

  html+=`</div></div>`;
  el.innerHTML = html;
}

// ─── ESTOQUE ─────────────────────────────────────────────────────────────────
function renderEst() {
  const el = document.getElementById('page-est');
  const baixo = estoque.filter(e=>e.qtd<=e.min);
  const valorTotal = estoque.reduce((s,e)=>s+(e.qtd*(e.custo||0)),0);

  let html = `
  <div class="stats">
    <div class="stat"><div class="stat-lbl">Itens cadastrados</div><div class="stat-val b">${estoque.length}</div></div>
    <div class="stat"><div class="stat-lbl">Abaixo do mínimo</div><div class="stat-val r">${baixo.length}</div></div>
    <div class="stat"><div class="stat-lbl">Valor em estoque</div><div class="stat-val g">R$ ${fmtR(valorTotal)}</div></div>
    <div class="stat"><div class="stat-lbl">Total peças</div><div class="stat-val">${estoque.reduce((s,e)=>s+e.qtd,0)}</div></div>
  </div>
  <div class="card"><div class="card-body">`;

  estoque.sort((a,b)=>(a.qtd<=a.min?-1:1)-(b.qtd<=b.min?-1:1)||a.nome.localeCompare(b.nome)).forEach(e=>{
    const alerta = e.qtd <= e.min;
    html+=`<div class="est-row">
      <div class="avatar ${alerta?'av-danger':'av-success'}">${e.id.replace(/\D/g,'').slice(-2)||'##'}</div>
      <div style="flex:1">
        <div class="est-nome">${e.nome}</div>
        <div style="font-size:11px;color:var(--text2)">Mín: ${e.min} ${e.un} · Custo: R$ ${fmtR(e.custo||0)}</div>
      </div>
      <div style="text-align:right">
        <div class="est-qtd ${alerta?'r':''}">${e.qtd} <span style="font-size:12px;color:var(--text2)">${e.un}</span></div>
        <div style="font-size:11px;color:var(--text2)">R$ ${fmtR((e.qtd)*(e.custo||0))}</div>
      </div>
      ${alerta?`<span class="badge badge-danger" style="flex-shrink:0">Repor</span>`:''}
    </div>`;
  });

  html+=`</div></div>`;
  el.innerHTML = html;
}

      <button class="fbtn ${manutFilter==='oil'?'active':''}" onclick="manutFilter='oil';renderManut()">Óleo</button>
      <button class="fbtn ${manutFilter==='rev'?'active':''}" onclick="manutFilter='rev';renderManut()">Revisão</button>

  if(filtered.length===0){ html+=`<div class="empty">Nenhum registro</div>`; }
  filtered.forEach(h=>{
    const moto = locMap[h.mId]||{};
    html+=`<div class="mhist-row">
      <div class="tipo-ico ${tipoClass(h.tipo)}">${tipoLabel(h.tipo).slice(0,3).toUpperCase()}</div>
      <div class="mhist-info">
        <div class="mhist-placa">${moto.placa||h.mId}</div>
        <div class="mhist-nome">${moto.nome||'—'}</div>
      </div>
      <div class="mhist-km">${h.km.toLocaleString('pt-BR')} km</div>
      <div class="mhist-data">${fmtD(h.data)}</div>
    </div>`;
  });

  html+=`</div></div>`;
  el.innerHTML = html;
}

// ─── MODAL EDITAR PAGAMENTO ──────────────────────────────────────────────────
function openEditModal(id) {
  const p = payments.find(x=>x.id===id);
  if(!p) return;
  modal = {payment:p, search:'', selLoc:null, opInput:p.operador||''};
  renderModal();
}

function renderModal() {
  if(!modal){ document.getElementById('modal-root').innerHTML=''; return; }
  const p = modal.payment;
  const l = locMap[p.mId]||{};
  const q = modal.search.toLowerCase();
  const filtered = motos.filter(m=>m.nome&&m.nome.trim()&&(!q||m.nome.toLowerCase().includes(q)||m.placa.toLowerCase().includes(q)));

  const html = `<div class="overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-ttl">Editar pagamento</div>
      <div class="modal-sub">R$ ${fmtR(p.valor)} · ${fmtD(p.data)} · <strong>${l.placa||'?'}</strong></div>
      <div class="modal-row">
        <div class="modal-lbl">Locatário (payer)</div>
        <input placeholder="Buscar por nome ou placa…" value="${modal.search.replace(/"/g,'&quot;')}" oninput="modal.search=this.value;renderModal()" style="width:100%">
        <div class="loc-list">
          ${filtered.map(m=>`<div class="loc-item ${(modal.selLoc||p.mId)===m.id?'sel':''}" onclick="modal.selLoc='${m.id}';renderModal()">
            <div class="avatar av-info" style="width:26px;height:26px;font-size:10px">${initials(m.nome)}</div>
            <div><div class="loc-nome">${m.nome}</div><div class="loc-det">${m.placa} · R$ ${fmtR(m.val||0)}/sem · ${m.dia||'—'}</div></div>
          </div>`).join('')}
          ${filtered.length===0?`<div class="empty" style="padding:1rem">Nenhum locatário encontrado</div>`:''}
        </div>
      </div>
      <div class="modal-row">
        <div class="modal-lbl">Operador (quem registrou)</div>
        <input placeholder="Nome do operador…" value="${modal.opInput.replace(/"/g,'&quot;')}" oninput="modal.opInput=this.value" style="width:100%">
      </div>
      <div class="modal-foot">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="saveModal()">Salvar alteração</button>
      </div>
    </div>
  </div>`;

  document.getElementById('modal-root').innerHTML = html;
  setTimeout(()=>{ const inp=document.querySelector('.modal input'); if(inp) inp.blur(); },10);
}

function closeModal(e) {
  if(e&&!e.target.classList.contains('overlay')) return;
  modal=null; renderModal();
}
function saveModal() {
  if(!modal) return;
  const idx = payments.findIndex(x=>x.id===modal.payment.id);
  if(idx>=0){
    if(modal.selLoc) payments[idx]={...payments[idx], mId:modal.selLoc};
    payments[idx]={...payments[idx], operador:modal.opInput};
  }
  modal=null; renderModal();
  renderPag();
}
